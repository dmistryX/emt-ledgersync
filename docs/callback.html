<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks Authorization - Emendate LedgerSync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-callback">
  <div class="panel">
    <div class="head">
      <div class="brand"><img src="../assets/icons/els_app.png" alt="Emendate LedgerSync logo"><div><h1>Emendate LedgerSync</h1><p>QuickBooks authorization callback</p></div></div>
      <div class="head-actions"><a href="index.html">Home</a><button id="themeBtn">Dark</button></div>
    </div>
    <div class="content" id="status"><div class="spinner"></div><h2 class="title">Processing authorization</h2><p class="sub">Please wait while we send credentials to your desktop app.</p></div>
  </div>

  <script>
    const root=document.documentElement,themeBtn=document.getElementById('themeBtn');
    const saved=localStorage.getItem('els-theme')||'light'; if(saved==='dark'){root.setAttribute('data-theme','dark');themeBtn.textContent='Light';}
    themeBtn.addEventListener('click',()=>{const dark=root.getAttribute('data-theme')==='dark'; if(dark){root.removeAttribute('data-theme');localStorage.setItem('els-theme','light');themeBtn.textContent='Dark';} else {root.setAttribute('data-theme','dark');localStorage.setItem('els-theme','dark');themeBtn.textContent='Light';}});

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const realmId = urlParams.get('realmId');
    const state = urlParams.get('state');
    const error = urlParams.get('error');
    const errorDescription = urlParams.get('error_description');
    const statusDiv = document.getElementById('status');

    if (error) showError(`Authorization failed: ${error}`, errorDescription);
    else if (code && realmId) sendToDesktopApp(code, realmId, state);
    else showError('Invalid response', 'Missing authorization code or company ID from QuickBooks.');

    function sendToDesktopApp(code, realmId, state) {
      statusDiv.innerHTML = `<span class="state ok">Authorized</span><h2 class="title">Authorization successful</h2><p class="sub">Sending credentials to the desktop app...</p>`;
      fetch('http://localhost:8080/oauth-callback', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, realmId, state }), mode: 'cors'
      }).then(response => { if (response.ok) { showSuccess(realmId); return; } throw new Error(); })
        .catch(() => showManualCopy(code, realmId));
    }

    function showSuccess(realmId) {
      statusDiv.innerHTML = `<span class="state ok">Synced</span><h2 class="title">Connected successfully</h2><p class="sub">Company ID: <strong>${realmId}</strong></p><p class="sub sub-spaced">You can close this tab.</p>`;
      try { window.close(); } catch (_) {}
    }

    function showManualCopy(code, realmId) {
      statusDiv.innerHTML = `<span class="state warn">Desktop app not detected</span><h2 class="title">Copy values manually</h2><p class="sub">Paste these values into the app's manual authorization dialog.</p><div class="code-box"><strong>Authorization code</strong><br>${code}</div><div class="code-box"><strong>Company ID (realmId)</strong><br>${realmId}</div><div class="btn-row"><button class="primary" onclick="copyCode()">Copy Authorization Code</button><button class="secondary" onclick="window.close()">Close</button></div>`;
    }

    function showError(title, message) {
      statusDiv.innerHTML = `<span class="state err">Error</span><h2 class="title">${title}</h2><div class="code-box">${message || 'An error occurred during authorization.'}</div><div class="btn-row"><button class="secondary" onclick="window.close()">Close</button></div>`;
    }

    function copyCode() {
      const box = document.querySelector('.code-box'); if (!box) return;
      const value = box.textContent.replace('Authorization code', '').trim();
      navigator.clipboard.writeText(value).then(() => alert('Authorization code copied.')).catch(() => {
        const ta = document.createElement('textarea'); ta.value = value; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); alert('Authorization code copied.'); } catch (_) { alert('Copy failed. Please copy manually.'); }
        document.body.removeChild(ta);
      });
    }
  </script>
</body>
</html>
